<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI 大逃杀 - 团体战争</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            touch-action: none;
        }

        /* 桌面端布局 */
        .game-container {
            display: grid;
            grid-template-columns: 1fr 320px;
            grid-template-rows: 50px 1fr 180px;
            height: 100vh;
            gap: 8px;
            padding: 8px;
        }

        .header {
            grid-column: 1 / -1;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 18px;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        .game-info {
            display: flex;
            gap: 20px;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 10px;
            opacity: 0.6;
        }

        .info-value {
            font-size: 16px;
            font-weight: bold;
            color: #00ff88;
        }

        .arena-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        #arena {
            width: 100%;
            height: 100%;
            touch-action: none;
            display: block;
            position: relative;
            z-index: 1;
        }

        .mini-event-log {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            max-height: 80px;
            overflow: hidden;
            pointer-events: none;
            z-index: 100;
            -webkit-mask-image: linear-gradient(to bottom, black 0%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 0%, transparent 100%);
        }

        .mini-event-item {
            padding: 4px 8px;
            margin-bottom: 4px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 4px;
            font-size: 10px;
            border-left: 2px solid;
            backdrop-filter: blur(4px);
        }

        .mini-event-item.combat { border-color: #ff4444; }
        .mini-event-item.heal { border-color: #00ff88; }
        .mini-event-item.elimination { border-color: #ff9800; }
        .mini-event-item.god { border-color: #00d9ff; }
        .mini-event-item.team { border-color: #e91e63; }
        .mini-event-item.item { border-color: #9c27b0; }

        .event-log-toggle {
            position: absolute;
            bottom: 10px;
            left: 10px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            z-index: 101;
            backdrop-filter: blur(4px);
            pointer-events: auto;
        }

        .event-log-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            padding: 20px;
        }

        .event-log-modal.show { display: flex; flex-direction: column; }

        .event-log-modal-content {
            background: rgba(20, 20, 40, 0.95);
            border-radius: 12px;
            padding: 15px;
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .event-log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .event-log-close {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .event-log-full {
            flex: 1;
            overflow-y: auto;
            font-size: 11px;
        }

        .event-log-full .event-item {
            padding: 6px 8px;
            margin-bottom: 6px;
            border-left: 3px solid;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0 4px 4px 0;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }

        .panel-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .panel-box h3 {
            margin-bottom: 10px;
            color: #00d9ff;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .team-list, .ai-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .team-entry {
            background: rgba(255, 255, 255, 0.06);
            padding: 8px;
            border-radius: 6px;
            border-left: 3px solid;
        }

        .team-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .team-name { font-weight: bold; font-size: 12px; }
        .team-count { font-size: 10px; opacity: 0.7; }
        .team-members { font-size: 10px; opacity: 0.8; line-height: 1.5; }

        .ai-entry {
            background: rgba(255, 255, 255, 0.06);
            padding: 6px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
        }

        .ai-entry.eliminated { opacity: 0.4; text-decoration: line-through; }

        .ai-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border: 2px solid;
            flex-shrink: 0;
        }

        .ai-details { flex: 1; min-width: 0; }
        .ai-name { font-weight: bold; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ai-action { font-size: 9px; color: #00ff88; margin-top: 1px; font-style: italic; }
        .ai-status { font-size: 9px; opacity: 0.7; margin-top: 1px; }
        .ai-health { width: 100%; height: 2px; background: rgba(255, 255, 255, 0.15); border-radius: 1px; margin-top: 2px; overflow: hidden; }
        .ai-health-bar { height: 100%; background: linear-gradient(90deg, #ff4444, #00ff88); transition: width 0.3s ease; }

        .control-panel {
            grid-column: 1 / -1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .control-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-start { background: linear-gradient(45deg, #00d9ff, #00ff88); color: #000; }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0, 217, 255, 0.4); }
        .btn-pause { background: rgba(255, 193, 7, 0.8); color: #000; }
        .btn-reset { background: rgba(244, 67, 54, 0.8); color: #fff; }

        .god-power { display: flex; gap: 6px; flex-wrap: wrap; }

        .god-btn {
            padding: 6px 12px;
            border: 2px solid;
            border-radius: 5px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        .god-btn:hover { background: rgba(255, 255, 255, 0.15); }
        .god-btn.active { background: rgba(255, 255, 255, 0.25); }
        .god-btn.heal { border-color: #00ff88; color: #00ff88; }
        .god-btn.damage { border-color: #ff4444; color: #ff4444; }
        .god-btn.speed { border-color: #00d9ff; color: #00d9ff; }
        .god-btn.freeze { border-color: #9c27b0; color: #9c27b0; }
        .god-btn.shield { border-color: #ff9800; color: #ff9800; }

        .speed-control { display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .speed-control label { font-size: 12px; opacity: 0.8; }
        .speed-slider { width: 100px; cursor: pointer; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show { display: flex; }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.15);
            max-width: 400px;
            width: 100%;
        }

        .modal h2 {
            font-size: 24px;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .winner-avatar { font-size: 60px; margin: 15px 0; }
        .modal button { margin-top: 15px; padding: 12px 30px; font-size: 14px; }

        .tooltip {
            position: absolute;
            background: rgba(10, 10, 20, 0.98);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 11px;
            z-index: 1000;
            pointer-events: none;
            min-width: 180px;
            max-width: 250px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .tooltip-name { font-weight: bold; color: #00d9ff; margin-bottom: 6px; font-size: 12px; }
        .tooltip-stat { margin: 3px 0; font-size: 10px; }
        .stat-label { opacity: 0.6; }
        .stat-value { color: #00ff88; font-weight: bold; }

        .damage-text {
            position: absolute;
            font-weight: bold;
            font-size: 14px;
            color: #ff4444;
            animation: floatUp 0.8s forwards;
            pointer-events: none;
            z-index: 200;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-25px) scale(1); }
        }

        .action-bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 9px;
            white-space: nowrap;
            animation: fadeOut 1.5s forwards;
            pointer-events: none;
            z-index: 150;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        .hit-effect {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,68,68,0.8) 0%, transparent 70%);
            animation: hitExpand 0.4s ease-out forwards;
            pointer-events: none;
            z-index: 180;
        }

        @keyframes hitExpand {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .heal-effect {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,255,136,0.8) 0%, transparent 70%);
            animation: healExpand 0.5s ease-out forwards;
            pointer-events: none;
            z-index: 180;
        }

        @keyframes healExpand {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* ========== 手机端适配 ========== */
        @media (max-width: 768px) {
            .game-container {
                grid-template-columns: 1fr;
                grid-template-rows: 45px 1fr 200px;
                gap: 6px;
                padding: 6px;
            }

            .header {
                padding: 8px 12px;
            }

            .header h1 {
                font-size: 14px;
            }

            .game-info {
                gap: 12px;
            }

            .info-label { font-size: 9px; }
            .info-value { font-size: 13px; }

            .side-panel {
                grid-row: 3;
                flex-direction: row;
                overflow-x: auto;
                overflow-y: hidden;
                -webkit-overflow-scrolling: touch;
            }

            .panel-box {
                min-width: 260px;
                flex-shrink: 0;
                max-height: 180px;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }

            .team-list { max-height: 100px; overflow-y: auto; }
            .ai-list { max-height: 140px; overflow-y: auto; }

            .control-panel {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: rgba(20, 20, 40, 0.95);
                border-radius: 16px 16px 0 0;
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-bottom: none;
                padding: 10px;
                z-index: 500;
                max-height: 160px;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }

            .god-power {
                order: 1;
                width: 100%;
                justify-content: center;
                margin-bottom: 8px;
            }

            .god-btn {
                padding: 8px 14px;
                font-size: 12px;
                min-width: 70px;
                text-align: center;
            }

            .speed-control {
                order: 2;
                width: 100%;
                justify-content: center;
                margin: 8px 0;
            }

            .control-btn {
                order: 3;
                flex: 1;
                min-width: 70px;
                padding: 10px 12px;
                font-size: 11px;
            }

            .mini-event-log {
                max-height: 60px;
                font-size: 9px;
            }

            .event-log-toggle {
                font-size: 10px;
                padding: 6px 10px;
                bottom: 160px;
            }

            .modal-content {
                padding: 20px;
            }

            .winner-avatar {
                font-size: 50px;
            }

            .modal h2 {
                font-size: 20px;
            }
        }

        /* 超小屏幕适配 */
        @media (max-width: 400px) {
            .game-info { gap: 8px; }
            .info-item { min-width: 40px; }
            .info-value { font-size: 12px; }
            
            .god-btn {
                padding: 6px 10px;
                font-size: 11px;
                min-width: 60px;
            }
            
            .team-members { font-size: 9px; }
            .ai-name { font-size: 10px; }
            
            .panel-box {
                min-width: 240px;
            }
        }

        /* 横屏模式优化 */
        @media (max-height: 500px) and (orientation: landscape) {
            .game-container {
                grid-template-rows: 40px 1fr 140px;
            }
            
            .side-panel {
                flex-direction: row;
            }
            
            .panel-box {
                min-width: 200px;
                max-height: 120px;
            }
            
            .control-panel {
                max-height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🤖 AI 大逃杀</h1>
            <div class="game-info">
                <div class="info-item">
                    <div class="info-label">存活</div>
                    <div class="info-value" id="alive-count">20</div>
                </div>
                <div class="info-item">
                    <div class="info-label">团体</div>
                    <div class="info-value" id="team-count">4</div>
                </div>
                <div class="info-item">
                    <div class="info-label">回合</div>
                    <div class="info-value" id="round-count">0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">时间</div>
                    <div class="info-value" id="game-time">00:00</div>
                </div>
            </div>
        </div>

        <div class="arena-container">
            <canvas id="arena" style="display:block; width:100%; height:100%;"></canvas>
            <div class="mini-event-log" id="mini-event-log"></div>
            <button class="event-log-toggle" id="event-log-toggle">📜 日志</button>
        </div>

        <div class="side-panel">
            <div class="panel-box">
                <h3>🚩 阵营</h3>
                <div class="team-list" id="team-list"></div>
            </div>

            <div class="panel-box">
                <h3>📊 AI 状态</h3>
                <div class="ai-list" id="ai-list"></div>
            </div>
        </div>

        <div class="control-panel">
            <div class="god-power">
                <button class="god-btn heal" data-power="heal">💚 治疗</button>
                <button class="god-btn damage" data-power="damage">💔 伤害</button>
                <button class="god-btn speed" data-power="speed">⚡ 加速</button>
                <button class="god-btn freeze" data-power="freeze">❄️ 冰冻</button>
                <button class="god-btn shield" data-power="shield">🛡️ 护盾</button>
            </div>

            <div class="speed-control">
                <label>速度:</label>
                <input type="range" class="speed-slider" id="speed-slider" min="1" max="10" value="7">
            </div>

            <button class="control-btn btn-start" id="btn-start">开始</button>
            <button class="control-btn btn-pause" id="btn-pause">暂停</button>
            <button class="control-btn btn-reset" id="btn-reset">重置</button>
        </div>
    </div>

    <div class="event-log-modal" id="event-log-modal">
        <div class="event-log-modal-content">
            <div class="event-log-header">
                <h3>📜 事件日志</h3>
                <button class="event-log-close" id="event-log-close">关闭</button>
            </div>
            <div class="event-log-full" id="event-log-full"></div>
        </div>
    </div>

    <div class="modal" id="winner-modal">
        <div class="modal-content">
            <h2>🏆 冠军!</h2>
            <div class="winner-avatar" id="winner-avatar"></div>
            <h3 id="winner-name"></h3>
            <p id="winner-desc"></p>
            <button class="control-btn btn-start" onclick="game.reset()">再来一局</button>
        </div>
    </div>

    <div class="tooltip" id="tooltip" style="display: none;"></div>

    <script>
// AI 大逃杀游戏 - 流畅移动版

class AIAgent {
    constructor(id, name, emoji, personality, strategy, team, color, x, y) {
        this.id = id;
        this.name = name;
        this.emoji = emoji || '🤖';
        this.personality = personality;
        this.strategy = strategy;
        this.team = team;
        this.color = color;
        this.x = x;
        this.y = y;
        this.health = 100;
        this.maxHealth = 100;
        this.speed = 1;
        this.attack = 10;
        this.defense = 5;
        this.alive = true;
        this.kills = 0;
        this.age = 0;
        this.target = null;
        this.state = 'wandering';
        this.action = '游荡中';
        this.moveCooldown = 0;
        this.attackCooldown = 0;
        this.hasShield = false;
        this.shieldTimer = 0;
        this.frozen = false;
        this.freezeTimer = 0;
        this.emoteTimer = 0;
        this.currentEmote = null;
        
        // 流畅移动系统
        this.velocityX = 0;
        this.velocityY = 0;
        this.acceleration = 0.3;
        this.friction = 0.92;
        this.maxSpeed = 3;
        this.moveAngle = Math.random() * Math.PI * 2;
        this.angleChangeRate = 0.05;
        this.wanderOffset = 0;
        this.wanderFrequency = 0.02;
        
        // 策略相关的移动特性
        this.setupMovementStyle();
    }
    
    setupMovementStyle() {
        // 不同策略有不同移动风格
        if (this.strategy === 'aggressive') {
            this.maxSpeed = 4;
            this.acceleration = 0.5;
            this.friction = 0.95;
            this.angleChangeRate = 0.08;
        } else if (this.strategy === 'defensive') {
            this.maxSpeed = 3.5;
            this.acceleration = 0.4;
            this.friction = 0.90;
            this.angleChangeRate = 0.12;
        } else if (this.strategy === 'team') {
            this.maxSpeed = 3.2;
            this.acceleration = 0.35;
            this.friction = 0.93;
            this.angleChangeRate = 0.06;
        } else if (this.strategy === 'opportunistic') {
            this.maxSpeed = 3.8;
            this.acceleration = 0.45;
            this.friction = 0.91;
            this.angleChangeRate = 0.15;
        }
        
        // 性格影响移动
        if (this.personality.name === 'brave') {
            this.maxSpeed *= 1.1;
            this.friction = 0.96;
        } else if (this.personality.name === 'cowardly') {
            this.maxSpeed *= 1.2;
            this.friction = 0.88;
        } else if (this.personality.name === 'cautious') {
            this.maxSpeed *= 0.9;
            this.friction = 0.94;
        }
    }

    update(agents, items, arenaWidth, arenaHeight) {
        if (!this.alive) return;

        this.age++;
        if (this.moveCooldown > 0) this.moveCooldown--;
        if (this.attackCooldown > 0) this.attackCooldown--;
        
        if (this.hasShield) {
            this.shieldTimer--;
            if (this.shieldTimer <= 0) this.hasShield = false;
        }
        
        if (this.frozen) {
            this.freezeTimer--;
            if (this.freezeTimer <= 0) {
                this.frozen = false;
            } else {
                this.action = '❄️ 冰冻';
                return;
            }
        }

        if (this.emoteTimer > 0) {
            this.emoteTimer--;
            if (this.emoteTimer <= 0) this.currentEmote = null;
        }

        this.decideBehavior(agents, items, arenaWidth, arenaHeight);
        this.executeBehavior(arenaWidth, arenaHeight);
        this.applyPhysics(arenaWidth, arenaHeight);
    }

    decideBehavior(agents, items, arenaWidth, arenaHeight) {
        const aliveAgents = agents.filter(a => a.alive && a.id !== this.id);
        if (aliveAgents.length === 0) return;

        const enemies = agents.filter(a => a.alive && a.team !== this.team);
        const teammates = agents.filter(a => a.alive && a.team === this.team && a.id !== this.id);
        
        // 当敌人很少时，更主动地寻找目标；当只剩少量 AI 时强制进攻
        const shouldAggro = enemies.length <= 2 || aliveAgents.length <= 5;

        const nearestItem = this.findNearestItem(items);
        if (nearestItem && this.distanceTo(nearestItem) < 150) {
            this.target = nearestItem;
            this.state = 'collecting';
            this.action = '🎒 捡道具';
            this.setEmote('😄');
            return;
        }

        // 如果已经没有敌人了（队友都死光了），主动寻找其他 AI 进行最后决战
        if (enemies.length === 0 && teammates.length === 0 && aliveAgents.length > 0) {
            this.target = this.findNearestAgent(aliveAgents);
            this.state = 'chasing';
            this.action = '🔥 最终决战!';
            if (Math.random() < 0.05) this.setEmote('😠');
            return;
        }

        if (this.strategy === 'aggressive' || this.personality.name === 'brave' || shouldAggro) {
            if (enemies.length > 0) {
                this.target = this.findNearestAgent(enemies);
                this.state = 'chasing';
                this.action = shouldAggro ? '🔥 最后决战!' : this.getAggressiveAction();
                if (Math.random() < 0.02) this.setEmote('😠');
            } else if (teammates.length > 0) {
                // 没有敌人了，但还有队友（同队内战）
                this.target = this.findNearestAgent(teammates);
                this.state = 'chasing';
                this.action = '⚔️ 内战!';
                if (Math.random() < 0.02) this.setEmote('😈');
            }
        } else if (this.strategy === 'defensive' || this.personality.name === 'cautious') {
            const nearestEnemy = this.findNearestAgent(enemies);
            if (nearestEnemy && this.distanceTo(nearestEnemy) < 120) {
                this.target = nearestEnemy;
                this.state = 'fleeing';
                this.action = '😨 逃跑';
                if (Math.random() < 0.03) this.setEmote('😰');
            } else if (teammates.length > 0) {
                this.target = this.findNearestAgent(teammates);
                this.state = 'following';
                this.action = '👥 跟随';
                if (Math.random() < 0.02) this.setEmote('😊');
            } else if (enemies.length > 0) {
                // 没有可见敌人，游荡寻找
                this.state = 'wandering';
                this.action = '🔍 寻找敌人';
            } else {
                this.state = 'wandering';
                this.action = this.generateRandomActivity();
            }
        } else if (this.strategy === 'team') {
            if (teammates.length > 0 && Math.random() < 0.7) {
                this.target = this.findNearestAgent(teammates);
                this.state = 'following';
                this.action = '👥 集结';
                if (Math.random() < 0.02) this.setEmote('🤝');
            } else if (enemies.length > 0) {
                const weakEnemy = enemies.find(e => e.health < 50);
                if (weakEnemy) {
                    this.target = weakEnemy;
                    this.state = 'chasing';
                    this.action = '🎯 集火';
                    if (Math.random() < 0.02) this.setEmote('😈');
                } else {
                    this.target = this.findNearestAgent(enemies);
                    this.state = 'chasing';
                    this.action = '⚔️ 寻敌';
                }
            } else if (teammates.length > 0) {
                // 没有敌人，和队友内战
                this.target = this.findNearestAgent(teammates);
                this.state = 'chasing';
                this.action = '⚔️ 内战!';
            }
        } else if (this.strategy === 'opportunistic') {
            const weakTarget = aliveAgents.find(a => a.health < 40);
            if (weakTarget) {
                this.target = weakTarget;
                this.state = 'chasing';
                this.action = '🦅 猎杀';
                if (Math.random() < 0.02) this.setEmote('😏');
            } else if (enemies.length > 0) {
                this.target = this.findNearestAgent(enemies);
                this.state = 'chasing';
                this.action = '⚔️ 寻敌';
            } else if (teammates.length > 0) {
                // 没有敌人，猎杀队友
                this.target = this.findNearestAgent(teammates);
                this.state = 'chasing';
                this.action = '🦅 猎杀队友!';
            } else {
                this.state = 'wandering';
                this.action = this.generateRandomActivity();
            }
        }

        if (this.health < 30 && this.personality.name !== 'brave') {
            const nearestThreat = this.findNearestAgent(enemies);
            if (nearestThreat && this.distanceTo(nearestThreat) < 150) {
                this.target = nearestThreat;
                this.state = 'fleeing';
                this.action = '💚 求援';
                if (Math.random() < 0.05) this.setEmote('😭');
            }
        }

        // 确保 wandering 状态的 AI 始终有活动
        if (!this.target || this.state === 'wandering') {
            this.state = 'wandering';
            // 更频繁地更新活动，让 AI 看起来更生动
            if (Math.random() < 0.08) {
                this.action = this.generateRandomActivity();
            } else if (!this.action || this.action === '游荡中') {
                this.action = this.generateRandomActivity();
            }
        }

        if (this.kills > 0 && Math.random() < 0.01) {
            this.setEmote('😎');
            this.action = '😎 得意';
        }
    }

        const actions = ['⚔️ 追击', '🔥 进攻', '💀 猎杀', '⚡ 突袭', '🎯 锁定', '😤 挑战'];
        return actions[Math.floor(Math.random() * actions.length)];
