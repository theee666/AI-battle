    executeBehavior(arenaWidth, arenaHeight) {
        if (this.frozen) return;

        const moveSpeed = this.maxSpeed * this.speed;

        if (this.state === 'chasing' && this.target && this.target.alive) {
            // 追击：直接加速向目标
            this.accelerateTowards(this.target.x, this.target.y, moveSpeed * 1.2);
            
            if (this.target instanceof AIAgent && this.distanceTo(this.target) < 60 && this.attackCooldown <= 0) {
                this.attackTarget(this.target);
            }
        } else if (this.state === 'fleeing' && this.target) {
            // 逃跑：快速远离，带急转弯
            const fleeX = this.x + (this.x - this.target.x);
            const fleeY = this.y + (this.y - this.target.y);
            this.accelerateTowards(fleeX, fleeY, moveSpeed * 1.5);
            
            // 逃跑时随机变向
            if (Math.random() < 0.1) {
                this.moveAngle += (Math.random() - 0.5) * 1.5;
            }
        } else if (this.state === 'following' && this.target && this.target.alive) {
            // 跟随：平滑接近，保持距离
            const dist = this.distanceTo(this.target);
            if (dist > 100) {
                this.accelerateTowards(this.target.x, this.target.y, moveSpeed * 0.8);
            } else if (dist < 50) {
                const fleeX = this.x + (this.x - this.target.x);
                const fleeY = this.y + (this.y - this.target.y);
                this.accelerateTowards(fleeX, fleeY, moveSpeed * 0.4);
            } else {
                // 保持距离时小范围移动
                this.wander(moveSpeed * 0.3);
            }
        } else if (this.state === 'collecting' && this.target) {
            // 收集：稳定向道具移动
            this.accelerateTowards(this.target.x, this.target.y, moveSpeed * 0.9);
            
            if (this.distanceTo(this.target) < 40) {
                this.collectItem(this.target);
            }
        } else {
            // 游荡：根据策略有不同风格 - 确保始终调用
            this.wanderBehavior(moveSpeed);
        }
        
        // 最终检查：确保 AI 不会完全停止（除了冰冻状态）
        const currentSpeed = Math.sqrt(this.velocityX * this.velocityX + this.velocityY * this.velocityY);
        if (currentSpeed < 0.5 && !this.frozen) {
            // 给一个随机方向的推动力
            const randomAngle = Math.random() * Math.PI * 2;
            this.velocityX += Math.cos(randomAngle) * moveSpeed * 0.5;
            this.velocityY += Math.sin(randomAngle) * moveSpeed * 0.5;
        }
    }
    
    // 流畅移动核心：加速向目标
    accelerateTowards(targetX, targetY, targetSpeed) {
        const dx = targetX - this.x;
        const dy = targetY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist > 0) {
            // 计算目标速度向量
            const targetVelX = (dx / dist) * targetSpeed;
            const targetVelY = (dy / dist) * targetSpeed;
            
            // 平滑加速
            this.velocityX += (targetVelX - this.velocityX) * this.acceleration;
            this.velocityY += (targetVelY - this.velocityY) * this.acceleration;
        }
    }
    
    // 游荡行为 - 不同策略有不同风格
    wanderBehavior(baseSpeed) {
        // 更新游荡角度 - 使用平滑的正弦波
        this.wanderOffset += this.wanderFrequency;
        
        // 确保 AI 始终保持移动 - 每帧都应用游荡
        if (this.strategy === 'aggressive') {
            // 进攻型：大范围巡逻，较少转弯，主动寻找
            this.moveAngle += Math.sin(this.wanderOffset) * 0.05;
            // 每帧都施加向前的力
            this.velocityX += Math.cos(this.moveAngle) * baseSpeed * 0.15;
            this.velocityY += Math.sin(this.moveAngle) * baseSpeed * 0.15;
        } else if (this.strategy === 'defensive') {
            // 防御型：小范围移动，频繁变向，保持警惕
            if (Math.random() < 0.15) {
                this.moveAngle += (Math.random() - 0.5) * 1.5;
            }
            this.velocityX += Math.cos(this.moveAngle) * baseSpeed * 0.12;
            this.velocityY += Math.sin(this.moveAngle) * baseSpeed * 0.12;
        } else if (this.strategy === 'team') {
            // 团队型：平滑移动，适度转弯
            this.moveAngle += Math.sin(this.wanderOffset * 0.5) * 0.08;
            this.velocityX += Math.cos(this.moveAngle) * baseSpeed * 0.13;
            this.velocityY += Math.sin(this.moveAngle) * baseSpeed * 0.13;
        } else if (this.strategy === 'opportunistic') {
            // 机会主义：zigzag 移动，不可预测
            if (Math.random() < 0.2) {
                this.moveAngle += (Math.random() - 0.5) * 2.0;
            }
            this.velocityX += Math.cos(this.moveAngle) * baseSpeed * 0.16;
            this.velocityY += Math.sin(this.moveAngle) * baseSpeed * 0.16;
        }
        
        // 确保最小速度 - 防止停滞
        const currentSpeed = Math.sqrt(this.velocityX * this.velocityX + this.velocityY * this.velocityY);
        if (currentSpeed < baseSpeed * 0.5) {
            this.velocityX += (Math.random() - 0.5) * baseSpeed * 0.3;
            this.velocityY += (Math.random() - 0.5) * baseSpeed * 0.3;
        }
    }
    
    // 应用物理系统
    applyPhysics(arenaWidth, arenaHeight) {
        // 应用摩擦力 - 降低摩擦让移动更持久
        this.velocityX *= this.friction;
        this.velocityY *= this.friction;
        
        // 限制最大速度
        const currentSpeed = Math.sqrt(this.velocityX * this.velocityX + this.velocityY * this.velocityY);
        if (currentSpeed > this.maxSpeed) {
            this.velocityX = (this.velocityX / currentSpeed) * this.maxSpeed;
            this.velocityY = (this.velocityY / currentSpeed) * this.maxSpeed;
        }
        
        // 确保最小移动速度 - 防止 AI 停滞
        const minSpeed = this.maxSpeed * 0.3;
        if (currentSpeed < minSpeed && currentSpeed > 0.01) {
            const scale = minSpeed / currentSpeed;
            this.velocityX *= scale;
            this.velocityY *= scale;
        } else if (currentSpeed < 0.01) {
            // 完全停止时随机给一个方向的速度
            const randomAngle = Math.random() * Math.PI * 2;
            this.velocityX = Math.cos(randomAngle) * minSpeed;
            this.velocityY = Math.sin(randomAngle) * minSpeed;
        }
        
        // 应用速度
        this.x += this.velocityX;
        this.y += this.velocityY;
        
        // 边界处理 - 弹性碰撞，更有弹性
        if (this.x < 25) {
            this.x = 25;
            this.velocityX *= -0.7;
            // 确保反弹后有足够速度
            if (Math.abs(this.velocityX) < 1) this.velocityX = -Math.abs(this.velocityX) - 1;
        } else if (this.x > arenaWidth - 25) {
            this.x = arenaWidth - 25;
            this.velocityX *= -0.7;
            if (Math.abs(this.velocityX) < 1) this.velocityX = Math.abs(this.velocityX) + 1;
        }
        
        if (this.y < 25) {
            this.y = 25;
            this.velocityY *= -0.7;
            if (Math.abs(this.velocityY) < 1) this.velocityY = -Math.abs(this.velocityY) - 1;
        } else if (this.y > arenaHeight - 25) {
            this.y = arenaHeight - 25;
            this.velocityY *= -0.7;
            if (Math.abs(this.velocityY) < 1) this.velocityY = Math.abs(this.velocityY) + 1;
        }
        
        // 更新移动角度
        const newSpeed = Math.sqrt(this.velocityX * this.velocityX + this.velocityY * this.velocityY);
        if (newSpeed > 0.1) {
            this.moveAngle = Math.atan2(this.velocityY, this.velocityX);
        }
    }

    setEmote(emote) {
        this.currentEmote = emote;
        this.emoteTimer = 60;
    }

    collectItem(item) {
        if (!item.collected) {
            item.collected = true;
            item.apply(this);
            this.setEmote('😄');
            game.showActionBubble(this, `+${item.effect}`);
        }
    }

    randomMove(speed, arenaWidth, arenaHeight) {
        // 不再使用这个函数，用流畅移动替代
    }

    attackTarget(target) {
        if (!target.alive) return;
        let damage = Math.max(1, this.attack - target.defense / 2);
        const teammates = game.agents.filter(a => a.alive && a.team === this.team && a.distanceTo(target) < 150);
        if (teammates.length > 1) damage *= (1 + teammates.length * 0.2);
        const actualDamage = Math.floor(damage * (0.8 + Math.random() * 0.4));
        
        if (target.hasShield) {
            const shieldAbsorb = Math.floor(actualDamage * 0.5);
            target.takeDamage(actualDamage - shieldAbsorb, this);
            game.showDamageText(target.x, target.y, `🛡️${shieldAbsorb}`);
        } else {
            target.takeDamage(actualDamage, this);
        }
        
        game.showDamageText(target.x, target.y, `-${actualDamage}`);
        game.showHitEffect(target.x, target.y);
        this.attackCooldown = 12;
        this.setEmote('😠');
        if (this.personality.name === 'brutal') target.takeDamage(Math.floor(actualDamage * 0.3), this);
        game.logEvent(`${this.name} 攻击 ${target.name} 造成 ${actualDamage} 伤害`, 'combat');
    }

    takeDamage(amount, attacker) {
        this.health -= amount;
        if (this.health <= 0) {
            this.health = 0;
            this.alive = false;
            this.setEmote('💀');
            if (attacker) { attacker.kills++; attacker.setEmote('😎'); }
            game.onAIEliminated(this, attacker);
        } else {
            this.setEmote(amount >= 15 ? '😖' : '😣');
        }
    }

    heal(amount) {
        const oldHealth = this.health;
        this.health = Math.min(this.maxHealth, this.health + amount);
        const actualHeal = this.health - oldHealth;
        if (actualHeal > 0) {
            game.showDamageText(this.x, this.y, `+${actualHeal}`, '#00ff88');
            game.showHealEffect(this.x, this.y);
            this.setEmote('😄');
        }
    }

    distanceTo(other) {
        const dx = this.x - other.x, dy = this.y - other.y;
        return Math.sqrt(dx * dx + dy * dy);
    }

    findNearestAgent(agents) {
        let nearest = null, minDist = Infinity;
        for (const agent of agents) {
            const dist = this.distanceTo(agent);
            if (dist < minDist) { minDist = dist; nearest = agent; }
        }
        return nearest;
    }

    findNearestItem(items) {
        let nearest = null, minDist = Infinity;
        for (const item of items) {
            if (item.collected) continue;
            const dist = this.distanceTo(item);
            if (dist < minDist) { minDist = dist; nearest = item; }
        }
        return nearest;
    }
}

class Item {
    constructor(type, x, y) {
        this.type = type; this.x = x; this.y = y; this.collected = false; this.respawnTime = 0;
        const configs = {
            'health': { emoji: '💚', effect: '治疗 30', color: '#00ff88' },
            'attack': { emoji: '⚔️', effect: '攻击 +5', color: '#ff4444' },
            'shield': { emoji: '🛡️', effect: '护盾 10s', color: '#ff9800' },
            'speed': { emoji: '⚡', effect: '加速 15s', color: '#00d9ff' },
            'damage': { emoji: '💣', effect: '伤害 20', color: '#9c27b0' }
        };
        const config = configs[type];
        this.emoji = config.emoji; this.effect = config.effect; this.color = config.color;
    }
    apply(agent) {
        switch(this.type) {
            case 'health': agent.heal(30); break;
            case 'attack': agent.attack += 5; break;
            case 'shield': agent.hasShield = true; agent.shieldTimer = 600; break;
            case 'speed': agent.speed *= 1.5; setTimeout(() => agent.speed /= 1.5, 15000); break;
            case 'damage':
                game.agents.forEach(a => {
                    if (a.alive && a.id !== agent.id && agent.distanceTo(a) < 100) a.takeDamage(20, agent);
                });
                break;
        }
    }
}

class Team {
    constructor(id, name, color, members = []) {
        this.id = id; this.name = name; this.color = color; this.members = members;
    }
    getAliveMembers() { return this.members.filter(m => m.alive); }
    getTotalHealth() { return this.getAliveMembers().reduce((sum, m) => sum + m.health, 0); }
}

class Game {
    constructor() {
        this.canvas = document.getElementById('arena');
        this.ctx = this.canvas.getContext('2d');
        this.agents = []; this.teams = []; this.items = [];
        this.isRunning = false; this.isPaused = false; this.round = 0;
        this.startTime = null; this.gameInterval = null;
        this.selectedPower = null; this.speed = 7; this.eventHistory = [];
        this.hoveredAgent = null;
        
        // 地狱模式
        this.hellMode = false;
        this.hellModeTriggered = false;
        this.safeZoneRadius = 0;
        this.safeZoneX = 0;
        this.safeZoneY = 0;
        
        // 游戏时间限制（毫秒）- 5 分钟强制结束
        this.maxGameTime = 5 * 60 * 1000;
        
        // 强制结束倒计时
        this.forceEndCountdown = 0;
        
        this.teamConfigs = [
            { name: '🔴 红队', color: '#ff4444' },
            { name: '🔵 蓝队', color: '#00d9ff' },
            { name: '🟢 绿队', color: '#00ff88' },
            { name: '🟡 黄队', color: '#ffeb3b' }
        ];

        this.personalities = [
            { name: 'brave', label: '勇敢', trait: '战斗到底' },
            { name: 'cowardly', label: '胆小', trait: '低血逃跑' },
            { name: 'brutal', label: '残暴', trait: '额外伤害' },
            { name: 'cautious', label: '谨慎', trait: '优先防御' }
        ];

        this.strategies = [
            { name: 'aggressive', label: '进攻型', trait: '主动追击' },
            { name: 'defensive', label: '防御型', trait: '避开战斗' },
            { name: 'team', label: '团队型', trait: '团队协作' },
            { name: 'opportunistic', label: '机会主义', trait: '专挑弱者' }
        ];

        this.emojis = ['🤖', '👾', '👽', '👻', '🤖', '👾', '👽', '👻', '🤖', '👾', 
                       '👽', '👻', '🤖', '👾', '👽', '👻', '🤖', '👾', '👽', '👻'];

        this.names = ['Alpha', 'Beta', 'Gamma', 'Delta', 'Epsilon', 'Zeta', 'Eta', 'Theta', 'Iota', 'Kappa',
                      'Lambda', 'Mu', 'Nu', 'Xi', 'Omicron', 'Pi', 'Rho', 'Sigma', 'Tau', 'Upsilon'];

        // 等待 DOM 完全加载
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => this.initGame());
        } else {
            this.initGame();
        }
    }
    
    initGame() {
        this.resizeCanvas();
        this.setupEventListeners();
        this.initTeams();
        this.initAgents();
        this.render();
        
        console.log('游戏初始化完成！AI 数量:', this.agents.length);
        console.log('Canvas 尺寸:', this.canvas.width, 'x', this.canvas.height);
    }

    resizeCanvas() {
        const container = this.canvas.parentElement;
        if (!container) {
            console.error('找不到 canvas 容器！');
            return;
        }
        
        const width = container.clientWidth || 800;
        const height = container.clientHeight || 600;
        
        this.canvas.width = width;
        this.canvas.height = height;
        
        console.log('Canvas 尺寸:', width, 'x', height);
        
        // 重新渲染
        if (this.agents.length > 0) {
            this.render();
        }
    }

    initTeams() {
        this.teams = this.teamConfigs.map((config, i) => new Team(i, config.name, config.color));
    }
    
    // 触发地狱模式
    triggerHellMode() {
        this.hellMode = true;
        this.hellModeTriggered = true;
        this.safeZoneRadius = Math.min(this.canvas.width, this.canvas.height) * 0.7;
        this.safeZoneX = this.canvas.width / 2;
        this.safeZoneY = this.canvas.height / 2;
        
        this.logEvent('🔥🔥🔥 地狱模式触发！安全区开始缩小！🔥🔥🔥', 'elimination');
        
        // 所有存活 AI 攻击提升，速度提升
        this.agents.filter(a => a.alive).forEach(a => {
            a.attack += 8;
            a.maxSpeed *= 1.3;
            a.setEmote('😱');
        });
    }
    
    // 更新地狱模式
    updateHellMode() {
        // 安全区逐渐缩小
        this.safeZoneRadius -= 0.5;
        if (this.safeZoneRadius < 80) this.safeZoneRadius = 80;
        
        // 在安全区外的 AI 受到伤害
        this.agents.forEach(a => {
            if (!a.alive) return;
            const distToCenter = Math.sqrt(
                Math.pow(a.x - this.safeZoneX, 2) + 
                Math.pow(a.y - this.safeZoneY, 2)
            );
            if (distToCenter > this.safeZoneRadius) {
                a.takeDamage(3, null); // 每秒约 6-9 点伤害
            }
        });
        
        // 地狱模式毒气 - 每 2 秒一次
        if (this.round % 120 === 0) {
            this.agents.filter(a => a.alive).forEach(a => {
                a.takeDamage(5, null);
            });
            this.logEvent('☠️ 毒气扩散！所有 AI -5HP', 'combat');
        }
    }
    
    // 强制结束游戏
    triggerForceEnd() {
        this.forceEndCountdown = 600; // 10 秒倒计时（60fps）
        this.logEvent('⚠️ 游戏时间已到！10 秒后强制结束！血量最高者获胜！', 'elimination');
    }

    initAgents() {
        this.agents = [];
        const allEmojis = ['🤖', '👾', '👽', '👻', '🤖', '👾', '👽', '👻', '🤖', '👾', 
                           '👽', '👻', '🤖', '👾', '👽', '👻', '🤖', '👾', '👽', '👻'];
        
        for (let i = 0; i < 20; i++) {
            const team = this.teams[i % 4];
            const personality = this.personalities[Math.floor(Math.random() * this.personalities.length)];
            const strategy = this.strategies[Math.floor(Math.random() * this.strategies.length)];
            const x = 50 + Math.random() * (this.canvas.width - 100);
            const y = 50 + Math.random() * (this.canvas.height - 100);
            
            const emoji = allEmojis[i] || '🤖';
            const agent = new AIAgent(i, this.names[i], emoji, personality, strategy, team, team.color, x, y);

            if (personality.name === 'brave') { agent.attack += 3; agent.defense -= 1; }
            else if (personality.name === 'cowardly') { agent.speed += 0.3; agent.defense += 2; }
            else if (personality.name === 'brutal') { agent.attack += 5; agent.health = 80; agent.maxHealth = 80; }
            else if (personality.name === 'cautious') { agent.defense += 4; agent.attack -= 2; }

            team.members.push(agent);
            this.agents.push(agent);
        }
        this.updateUI();
    }

    initItems() {
        this.items = [];
        const itemTypes = ['health', 'attack', 'shield', 'speed', 'damage'];
        for (let i = 0; i < 8; i++) {
            const type = itemTypes[Math.floor(Math.random() * itemTypes.length)];
            const x = 80 + Math.random() * (this.canvas.width - 160);
            const y = 80 + Math.random() * (this.canvas.height - 160);
            this.items.push(new Item(type, x, y));
        }
    }

    setupEventListeners() {
        window.addEventListener('resize', () => { this.resizeCanvas(); this.render(); });
        document.getElementById('btn-start').addEventListener('click', () => this.start());
        document.getElementById('btn-pause').addEventListener('click', () => this.togglePause());
        document.getElementById('btn-reset').addEventListener('click', () => this.reset());
        
        document.getElementById('speed-slider').addEventListener('input', (e) => {
            this.speed = parseInt(e.target.value);
            if (this.isRunning && !this.isPaused) { this.stopGameLoop(); this.startGameLoop(); }
        });

        document.querySelectorAll('.god-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.god-btn').forEach(b => b.classList.remove('active'));
                if (this.selectedPower === e.target.dataset.power) {
                    this.selectedPower = null;
                } else {
                    this.selectedPower = e.target.dataset.power;
                    e.target.classList.add('active');
                }
            });
        });

        document.getElementById('event-log-toggle').addEventListener('click', () => {
            document.getElementById('event-log-modal').classList.add('show');
        });
        document.getElementById('event-log-close').addEventListener('click', () => {
            document.getElementById('event-log-modal').classList.remove('show');
        });
        document.getElementById('event-log-modal').addEventListener('click', (e) => {
            if (e.target.id === 'event-log-modal') {
                document.getElementById('event-log-modal').classList.remove('show');
            }
        });

        document.getElementById('ai-list').addEventListener('mousemove', (e) => {
            const entry = e.target.closest('.ai-entry');
            if (entry && entry.dataset.agentId) {
                const agentId = parseInt(entry.dataset.agentId);
                this.hoveredAgent = this.agents.find(a => a.id === agentId);
                this.render();
            }
        });
        
        document.getElementById('ai-list').addEventListener('mouseleave', () => {
            this.hoveredAgent = null;
            this.render();
        });

        let touchStartX = 0, touchStartY = 0;
        this.canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX; touchStartY = touch.clientY;
        }, { passive: false });

        this.canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            const rect = this.canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left; const y = touch.clientY - rect.top;
            if (Math.abs(touch.clientX - touchStartX) < 10 && Math.abs(touch.clientY - touchStartY) < 10) {
                this.handleCanvasClick({ clientX: touch.clientX, clientY: touch.clientY });
            }
        }, { passive: false });

        this.canvas.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
        this.canvas.addEventListener('click', (e) => this.handleCanvasClick(e));
        this.canvas.addEventListener('mousemove', (e) => this.handleCanvasMouseMove(e));
        this.canvas.addEventListener('mouseleave', () => {
            this.hoveredAgent = null;
            document.getElementById('tooltip').style.display = 'none';
            this.render();
        });
    }

    handleCanvasClick(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left; const y = e.clientY - rect.top;
        if (!this.selectedPower) return;
        for (const agent of this.agents) {
            if (!agent.alive) continue;
            const dist = Math.sqrt((x - agent.x) ** 2 + (y - agent.y) ** 2);
            if (dist < 35) { this.useGodPower(agent); break; }
        }
    }

    handleCanvasMouseMove(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left; const y = e.clientY - rect.top;
        const tooltip = document.getElementById('tooltip');
        let foundAgent = null;

        for (const agent of this.agents) {
            if (!agent.alive) continue;
            const dist = Math.sqrt((x - agent.x) ** 2 + (y - agent.y) ** 2);
            if (dist < 35) { foundAgent = agent; break; }
        }

        this.hoveredAgent = foundAgent;
        this.render();

        if (foundAgent) {
            tooltip.innerHTML = `
                <div class="tooltip-name">${foundAgent.emoji} ${foundAgent.name}</div>
                <div class="tooltip-stat"><span class="stat-label">团体:</span> <span class="stat-value" style="color:${foundAgent.team.color}">${foundAgent.team.name}</span></div>
                <div class="tooltip-stat"><span class="stat-label">性格:</span> <span class="stat-value">${foundAgent.personality.label}</span></div>
                <div class="tooltip-stat"><span class="stat-label">策略:</span> <span class="stat-value">${foundAgent.strategy.label}</span></div>
                <div class="tooltip-stat"><span class="stat-label">生命:</span> <span class="stat-value">${Math.floor(foundAgent.health)}/${foundAgent.maxHealth}</span></div>
                <div class="tooltip-stat"><span class="stat-label">击杀:</span> <span class="stat-value">${foundAgent.kills}</span></div>
                <div class="tooltip-stat"><span class="stat-label">行动:</span> <span class="stat-value">${foundAgent.action}</span></div>
            `;
            tooltip.style.display = 'block';
            tooltip.style.left = (e.clientX + 15) + 'px';
            tooltip.style.top = (e.clientY + 15) + 'px';
        } else {
            tooltip.style.display = 'none';
        }
    }

    useGodPower(agent) {
        if (this.selectedPower === 'heal') { agent.heal(40); this.logEvent(`${agent.name} 被治疗 +40HP`, 'heal'); }
        else if (this.selectedPower === 'damage') { agent.takeDamage(40, null); this.logEvent(`${agent.name} 被惩罚 -40HP`, 'combat'); }
        else if (this.selectedPower === 'speed') { agent.speed *= 2; setTimeout(() => agent.speed /= 2, 10000); this.logEvent(`${agent.name} 获得加速`, 'god'); }
        else if (this.selectedPower === 'freeze') { agent.frozen = true; agent.freezeTimer = 300; this.logEvent(`${agent.name} 被冰冻`, 'god'); }
        else if (this.selectedPower === 'shield') { agent.hasShield = true; agent.shieldTimer = 600; this.logEvent(`${agent.name} 获得护盾`, 'god'); }
        this.selectedPower = null;
        document.querySelectorAll('.god-btn').forEach(b => b.classList.remove('active'));
        this.updateUI();
    }

    start() {
        if (this.isRunning) return;
        this.isRunning = true; this.isPaused = false; this.startTime = Date.now();
        this.initItems(); this.startGameLoop();
        document.getElementById('btn-start').textContent = '运行中';
        this.logEvent('游戏开始！4 个团体 20 个 AI 的生存竞赛', 'god');
    }

    togglePause() {
        if (!this.isRunning) return;
        this.isPaused = !this.isPaused;
        if (this.isPaused) {
            this.stopGameLoop();
            document.getElementById('btn-pause').textContent = '继续';
            this.logEvent('游戏暂停', 'god');
        } else {
            this.startGameLoop();
            document.getElementById('btn-pause').textContent = '暂停';
            this.logEvent('游戏继续', 'god');
        }
    }

    reset() {
        this.stopGameLoop();
        this.isRunning = false; this.isPaused = false; this.round = 0; this.startTime = null;
        this.hellMode = false;
        this.hellModeTriggered = false;
        this.forceEndCountdown = 0;
        document.getElementById('btn-start').textContent = '开始游戏';
        document.getElementById('btn-pause').textContent = '暂停';
        document.getElementById('winner-modal').classList.remove('show');
        this.eventHistory = [];
        document.getElementById('mini-event-log').innerHTML = '';
        document.getElementById('event-log-full').innerHTML = '';
        this.teams.forEach(t => t.members = []);
        this.initTeams(); this.initAgents(); this.items = [];
        this.render(); this.updateUI();
    }

    startGameLoop() {
        const interval = Math.max(20, 250 - (this.speed * 20));
        this.gameInterval = setInterval(() => this.gameLoop(), interval);
    }

    stopGameLoop() {
        if (this.gameInterval) { clearInterval(this.gameInterval); this.gameInterval = null; }
    }

    gameLoop() {
        if (this.isPaused) return;
        this.round++;
        
        const aliveCount = this.agents.filter(a => a.alive).length;
        
        // 检查游戏时间 - 超时强制结束
        const elapsedTime = Date.now() - this.startTime;
        if (elapsedTime > this.maxGameTime && this.forceEndCountdown === 0) {
            this.triggerForceEnd();
        }
        
        // 检查地狱模式触发条件 - 只剩 5 个 AI 时触发
        if (aliveCount <= 5 && !this.hellModeTriggered) {
            this.triggerHellMode();
        }
        
        // 地狱模式效果
        if (this.hellMode) {
            this.updateHellMode();
        }
        
        // 强制结束倒计时
        if (this.forceEndCountdown > 0) {
            this.forceEndCountdown--;
            if (this.forceEndCountdown % 60 === 0) {
                this.logEvent(`⏰ 强制结束倒计时：${Math.ceil(this.forceEndCountdown/60)}秒`, 'elimination');
            }
            // 最后 3 秒每秒造成伤害
            if (this.forceEndCountdown > 0 && this.forceEndCountdown <= 180) {
                this.agents.filter(a => a.alive).forEach(a => a.takeDamage(3, null));
            }
            if (this.forceEndCountdown <= 0) {
                const aliveAgents = this.agents.filter(a => a.alive);
                if (aliveAgents.length > 0) {
                    const winner = aliveAgents.reduce((max, a) => a.health > max.health ? a : max, aliveAgents[0]);
                    this.endGame(winner);
                } else {
                    this.endGame(null);
                }
                return;
            }
        }
        
        for (const agent of this.agents) {
            agent.update(this.agents, this.items, this.canvas.width, this.canvas.height);
        }
        this.items.forEach(item => {
            if (item.collected) {
                item.respawnTime--;
                if (item.respawnTime <= 0) {
                    item.collected = false;
                    item.x = 80 + Math.random() * (this.canvas.width - 160);
                    item.y = 80 + Math.random() * (this.canvas.height - 160);
                }
            }
        });
        if (Math.random() < 0.01 && this.items.filter(i => !i.collected).length < 10) {
            const itemTypes = ['health', 'attack', 'shield', 'speed', 'damage'];
            const type = itemTypes[Math.floor(Math.random() * itemTypes.length)];
            const x = 80 + Math.random() * (this.canvas.width - 160);
            const y = 80 + Math.random() * (this.canvas.height - 160);
            const newItem = new Item(type, x, y);
            newItem.respawnTime = 600;
            this.items.push(newItem);
            this.logEvent(`📦 新道具：${newItem.emoji} ${newItem.effect}`, 'item');
        }
        const aliveAgents = this.agents.filter(a => a.alive);
        if (aliveAgents.length === 1) { 
            this.endGame(aliveAgents[0]); 
            return; 
        } else if (aliveAgents.length === 0) { 
            // 所有人都死了，最后死的人获胜（击杀数最多的）
            const lastKiller = this.agents.reduce((max, a) => a.kills > max.kills ? a : max, this.agents[0]);
            this.endGame(lastKiller);
            return; 
        }
        if (Math.random() < 0.015) this.triggerRandomEvent();
        this.render(); this.updateUI();
    }

    triggerHellMode() {
        this.hellMode = true;
        this.hellModeTriggered = true;
        this.safeZoneRadius = Math.min(this.canvas.width, this.canvas.height) * 0.6;
        this.safeZoneX = this.canvas.width / 2;
        this.safeZoneY = this.canvas.height / 2;
        
        this.logEvent('🔥🔥🔥 地狱模式触发！安全区开始缩小！🔥🔥🔥', 'elimination');
        
        // 所有存活 AI 攻击提升
        this.agents.filter(a => a.alive).forEach(a => {
            a.attack += 5;
            a.setEmote('😱');
        });
    }
    
    updateHellMode() {
        // 安全区逐渐缩小
        this.safeZoneRadius -= 0.3;
        if (this.safeZoneRadius < 100) this.safeZoneRadius = 100;
        
        // 在安全区外的 AI 受到伤害
        this.agents.forEach(a => {
            if (!a.alive) return;
            const distToCenter = Math.sqrt(
                Math.pow(a.x - this.safeZoneX, 2) + 
                Math.pow(a.y - this.safeZoneY, 2)
            );
            if (distToCenter > this.safeZoneRadius) {
                a.takeDamage(2, null); // 每秒约 4-6 点伤害
                if (Math.random() < 0.05) {
                    this.logEvent(`⚠️ ${a.name} 在安全区外受到伤害！`, 'combat');
                }
            }
        });
        
        // 地狱模式毒气
        if (this.round % 180 === 0) { // 每 3 秒一次
            this.agents.filter(a => a.alive).forEach(a => {
                a.takeDamage(3, null);
            });
            this.logEvent('☠️ 毒气扩散！所有 AI -3HP', 'combat');
        }
    }
    
    triggerForceEnd() {
        this.forceEndCountdown = 300; // 10 秒倒计时
        this.logEvent('⚠️ 游戏时间已到！10 秒后强制结束！血量最高者获胜！', 'elimination');
    }

    triggerRandomEvent() {
        // 地狱模式下不触发治疗波
        const events = [
            { name: '毒气扩散', effect: () => { this.agents.forEach(a => { if (a.alive) a.takeDamage(8, null); }); this.logEvent('⚠️ 毒气！所有 AI -8HP', 'combat'); }, weight: this.hellMode ? 0.5 : 1 },
            { name: '治疗波', effect: () => { this.agents.forEach(a => { if (a.alive) a.heal(15); }); this.logEvent('💚 治疗波！所有 AI +15HP', 'heal'); }, weight: this.hellMode ? 0 : 1 },
            { name: '道具雨', effect: () => {
                for (let i = 0; i < 5; i++) {
                    const itemTypes = ['health', 'attack', 'shield', 'speed'];
                    const type = itemTypes[Math.floor(Math.random() * itemTypes.length)];
                    const x = 80 + Math.random() * (this.canvas.width - 160);
                    const y = 80 + Math.random() * (this.canvas.height - 160);
                    this.items.push(new Item(type, x, y));
                }
                this.logEvent('📦 道具雨！5 个道具', 'item');
            }, weight: 1 },
            { name: '狂暴', effect: () => {
                const alive = this.agents.filter(a => a.alive);
                const random = alive[Math.floor(Math.random() * alive.length)];
                if (random) { random.attack += 8; this.logEvent(`⚡ ${random.name} 狂暴！`, 'god'); }
            }, weight: 1 }
        ];
        
        // 根据权重选择事件
        const totalWeight = events.reduce((sum, e) => sum + e.weight, 0);
        let random = Math.random() * totalWeight;
        for (const event of events) {
            if (random < event.weight) {
                event.effect();
                return;
            }
            random -= event.weight;
        }
    }

    onAIEliminated(agent, killer) {
        const aliveCount = this.agents.filter(a => a.alive).length;
        if (killer) {
            this.logEvent(`💀 ${agent.name} 被 ${killer.name} 淘汰 | 剩余：${aliveCount}`, 'elimination');
        } else {
            this.logEvent(`💀 ${agent.name} 被淘汰 | 剩余：${aliveCount}`, 'elimination');
        }
    }

    endGame(winner) {
        this.stopGameLoop(); this.isRunning = false;
        const modal = document.getElementById('winner-modal');
        if (winner) {
            const elapsedTime = Math.floor((Date.now() - this.startTime) / 1000);
            const minutes = Math.floor(elapsedTime / 60);
            const seconds = elapsedTime % 60;
            document.getElementById('winner-avatar').textContent = winner.emoji;
            document.getElementById('winner-name').textContent = `🏆 ${winner.name}`;
            document.getElementById('winner-name').style.color = winner.team.color;
            document.getElementById('winner-desc').innerHTML = `团体：${winner.team.name} | 性格：${winner.personality.label}<br>击杀：${winner.kills} | 时间：${minutes}分${seconds}秒`;
            this.logEvent(`🏆 冠军！${winner.name}(${winner.team.name}) 获胜！`, 'god');
        } else {
            document.getElementById('winner-avatar').textContent = '💀';
            document.getElementById('winner-name').textContent = '无人幸存';
            document.getElementById('winner-desc').textContent = '所有 AI 都被淘汰了...';
        }
        modal.classList.add('show');
    }

    logEvent(message, type) {
        this.eventHistory.push({ message, type, round: this.round });
        if (this.eventHistory.length > 100) this.eventHistory.shift();
        const miniLog = document.getElementById('mini-event-log');
        const recentEvents = this.eventHistory.slice(-5);
        miniLog.innerHTML = recentEvents.map(e => `<div class="mini-event-item ${e.type}">[${e.round}] ${e.message}</div>`).join('');
        const fullLog = document.getElementById('event-log-full');
        fullLog.innerHTML = this.eventHistory.map(e => `<div class="event-item ${e.type}">[${e.round}] ${e.message}</div>`).join('');
    }

    showDamageText(x, y, text, color = '#ff4444') {
        const div = document.createElement('div');
        div.className = 'damage-text'; div.textContent = text; div.style.color = color;
        div.style.left = (this.canvas.getBoundingClientRect().left + x) + 'px';
        div.style.top = (this.canvas.getBoundingClientRect().top + y - 20) + 'px';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }

    showHitEffect(x, y) {
        const div = document.createElement('div');
        div.className = 'hit-effect';
        div.style.width = '60px'; div.style.height = '60px';
        div.style.left = (this.canvas.getBoundingClientRect().left + x - 30) + 'px';
        div.style.top = (this.canvas.getBoundingClientRect().top + y - 30) + 'px';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 400);
    }

    showHealEffect(x, y) {
        const div = document.createElement('div');
        div.className = 'heal-effect';
        div.style.width = '70px'; div.style.height = '70px';
        div.style.left = (this.canvas.getBoundingClientRect().left + x - 35) + 'px';
        div.style.top = (this.canvas.getBoundingClientRect().top + y - 35) + 'px';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 500);
    }

    showActionBubble(agent, text) {
        const div = document.createElement('div');
        div.className = 'action-bubble'; div.textContent = text;
        div.style.left = (this.canvas.getBoundingClientRect().left + agent.x - 20) + 'px';
        div.style.top = (this.canvas.getBoundingClientRect().top + agent.y - 40) + 'px';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 1500);
    }

    updateUI() {
        const aliveAgents = this.agents.filter(a => a.alive);
        const aliveTeams = this.teams.filter(t => t.getAliveMembers().length > 0);
        document.getElementById('alive-count').textContent = aliveAgents.length;
        document.getElementById('team-count').textContent = aliveTeams.length;
        document.getElementById('round-count').textContent = this.round;
        
        // 地狱模式显示
        const aliveCountEl = document.getElementById('alive-count');
        if (this.hellMode) {
            aliveCountEl.style.color = '#ff4444';
            if (this.forceEndCountdown > 0) {
                aliveCountEl.textContent = `${aliveAgents.length} (倒计时)`;
            }
        } else {
            aliveCountEl.style.color = '#00ff88';
        }
        if (this.startTime) {
            const elapsedTime = Math.floor((Date.now() - this.startTime) / 1000);
            const minutes = Math.floor(elapsedTime / 60);
            const seconds = elapsedTime % 60;
            document.getElementById('game-time').textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        const teamList = document.getElementById('team-list');
        teamList.innerHTML = '';
        for (const team of this.teams) {
            const aliveMembers = team.getAliveMembers();
            const entry = document.createElement('div');
            entry.className = 'team-entry'; entry.style.borderLeftColor = team.color;
            const memberNames = aliveMembers.map(m => `${m.emoji}${m.name}`).join(' ');
            entry.innerHTML = `
                <div class="team-header">
                    <span class="team-name" style="color:${team.color}">${team.name}</span>
                    <span class="team-count">${aliveMembers.length}人 | ${team.getTotalHealth()}HP</span>
                </div>
                <div class="team-members">${memberNames || '全灭'}</div>
            `;
            teamList.appendChild(entry);
        }

        const aiList = document.getElementById('ai-list');
        aiList.innerHTML = '';
        const sortedAgents = [...this.agents].sort((a, b) => {
            if (a.alive !== b.alive) return b.alive - a.alive;
            return b.kills - a.kills;
        });
        for (const agent of sortedAgents) {
            const entry = document.createElement('div');
            entry.className = `ai-entry ${agent.alive ? '' : 'eliminated'}`;
            entry.dataset.agentId = agent.id;
            entry.style.borderLeft = `3px solid ${agent.team.color}`;
            entry.innerHTML = `
                <div class="ai-avatar" style="background: ${agent.team.color}; border-color: ${agent.team.color}">
                    ${agent.emoji}
                </div>
                <div class="ai-details">
                    <div class="ai-name">${agent.name} <span style="color:${agent.team.color};font-size:9px">[${agent.team.name}]</span></div>
                    <div class="ai-action">${agent.action}</div>
                    <div class="ai-status">${agent.personality.label} · ⚔️${agent.kills}</div>
                    <div class="ai-health">
                        <div class="ai-health-bar" style="width: ${(agent.health / agent.maxHealth) * 100}%"></div>
                    </div>
                </div>
            `;
            aiList.appendChild(entry);
        }
    }

    render() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.drawGrid();
        this.drawTeamZones();
        
        // 绘制地狱模式安全区
        if (this.hellMode) {
            this.drawHellMode();
        }
        
        // 绘制道具
        for (const item of this.items) { if (!item.collected) this.drawItem(item); }
        
        // 先绘制死去的 AI（底层，变灰）
        for (const agent of this.agents) {
            if (!agent.alive && agent !== this.hoveredAgent) {
                this.drawAgent(agent, false, true);
            }
        }
        
        // 再绘制活着的 AI（上层）
        for (const agent of this.agents) {
            if (agent.alive && agent !== this.hoveredAgent) {
                this.drawAgent(agent, false, false);
            }
        }
        
        // 最后绘制悬停的 AI（最上层）
        if (this.hoveredAgent) {
            this.drawAgent(this.hoveredAgent, true, !this.hoveredAgent.alive);
        }
        
        if (this.selectedPower) this.drawPowerIndicator();
    }
    
    drawHellMode() {
        // 绘制安全区外的危险区域
        this.ctx.save();
        this.ctx.beginPath();
        this.ctx.rect(0, 0, this.canvas.width, this.canvas.height);
        this.ctx.arc(this.safeZoneX, this.safeZoneY, this.safeZoneRadius, 0, Math.PI * 2, true);
        this.ctx.closePath();
        this.ctx.fillStyle = 'rgba(255, 68, 68, 0.15)';
        this.ctx.fill();
        
        // 绘制安全区边界
        this.ctx.beginPath();
        this.ctx.arc(this.safeZoneX, this.safeZoneY, this.safeZoneRadius, 0, Math.PI * 2);
        this.ctx.strokeStyle = 'rgba(255, 68, 68, 0.8)';
        this.ctx.lineWidth = 4;
        this.ctx.setLineDash([20, 10]);
        this.ctx.stroke();
        this.ctx.setLineDash([]);
        
        // 绘制警告文字
        if (this.forceEndCountdown > 0) {
            this.ctx.fillStyle = '#ff4444';
            this.ctx.font = 'bold 30px Arial';
            this.ctx.textAlign = 'center';
            this.ctx.fillText(`⚠️ 强制结束：${Math.ceil(this.forceEndCountdown/60)}秒 ⚠️`, this.canvas.width/2, 60);
        } else {
            this.ctx.fillStyle = '#ff4444';
            this.ctx.font = 'bold 24px Arial';
            this.ctx.textAlign = 'center';
            this.ctx.fillText('🔥 地狱模式 - 安全区缩小中 🔥', this.canvas.width/2, 50);
        }
        
        this.ctx.restore();
    }

    drawGrid() {
        this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)'; this.ctx.lineWidth = 1;
        const gridSize = 50;
        for (let x = 0; x < this.canvas.width; x += gridSize) {
            this.ctx.beginPath(); this.ctx.moveTo(x, 0); this.ctx.lineTo(x, this.canvas.height); this.ctx.stroke();
        }
        for (let y = 0; y < this.canvas.height; y += gridSize) {
            this.ctx.beginPath(); this.ctx.moveTo(0, y); this.ctx.lineTo(this.canvas.width, y); this.ctx.stroke();
        }
    }

    drawTeamZones() {
        this.teams.forEach((team, i) => {
            const x = (i % 2) * (this.canvas.width / 2) + 50;
            const y = Math.floor(i / 2) * (this.canvas.height / 2) + 50;
            this.ctx.strokeStyle = team.color; this.ctx.lineWidth = 2;
            this.ctx.setLineDash([10, 5]); this.ctx.globalAlpha = 0.2;
            this.ctx.strokeRect(x - 80, y - 80, 160, 160);
            this.ctx.globalAlpha = 1.0; this.ctx.setLineDash([]);
            this.ctx.fillStyle = team.color; this.ctx.font = 'bold 12px Arial'; this.ctx.textAlign = 'center';
            this.ctx.fillText(team.name, x, y - 90);
        });
    }

    drawItem(item) {
        const gradient = this.ctx.createRadialGradient(item.x, item.y, 10, item.x, item.y, 25);
        gradient.addColorStop(0, item.color + '60'); gradient.addColorStop(1, 'transparent');
        this.ctx.fillStyle = gradient;
        this.ctx.beginPath(); this.ctx.arc(item.x, item.y, 25, 0, Math.PI * 2); this.ctx.fill();
        this.ctx.font = '24px Arial'; this.ctx.textAlign = 'center'; this.ctx.textBaseline = 'middle';
        this.ctx.fillStyle = item.color; this.ctx.fillText(item.emoji, item.x, item.y);
    }

    drawAgent(agent, isHighlighted = false, isDead = false) {
        const isActuallyDead = !agent.alive;
        
        if (isHighlighted && !isActuallyDead) {
            const highlightGradient = this.ctx.createRadialGradient(agent.x, agent.y, 25, agent.x, agent.y, 60);
            highlightGradient.addColorStop(0, agent.color + '80');
            highlightGradient.addColorStop(0.5, agent.color + '40');
            highlightGradient.addColorStop(1, 'transparent');
            this.ctx.fillStyle = highlightGradient;
            this.ctx.beginPath(); this.ctx.arc(agent.x, agent.y, 60, 0, Math.PI * 2); this.ctx.fill();
            this.ctx.strokeStyle = '#ffffff'; this.ctx.lineWidth = 6;
            this.ctx.shadowColor = agent.color; this.ctx.shadowBlur = 20;
        } else {
            this.ctx.shadowBlur = 0;
        }

        // 死去的 AI 使用灰色滤镜和半透明
        if (isActuallyDead) {
            this.ctx.save();
            this.ctx.globalAlpha = 0.5;
            this.ctx.filter = 'grayscale(100%)';
        }

        const gradient = this.ctx.createRadialGradient(agent.x, agent.y, 20, agent.x, agent.y, 40);
        gradient.addColorStop(0, agent.color + '40'); gradient.addColorStop(1, 'transparent');
        this.ctx.fillStyle = gradient;
        this.ctx.beginPath(); this.ctx.arc(agent.x, agent.y, 40, 0, Math.PI * 2); this.ctx.fill();

        this.ctx.fillStyle = agent.alive ? agent.color : '#666';
        this.ctx.beginPath(); this.ctx.arc(agent.x, agent.y, 25, 0, Math.PI * 2); this.ctx.fill();

        this.ctx.strokeStyle = agent.color;
        this.ctx.lineWidth = isHighlighted ? 6 : 4;
        this.ctx.stroke();

        this.ctx.font = '24px Arial'; this.ctx.textAlign = 'center'; this.ctx.textBaseline = 'middle';
        this.ctx.fillStyle = '#fff';
        this.ctx.fillText(agent.emoji, agent.x, agent.y);
        
        if (agent.currentEmote && agent.alive) {
            this.ctx.font = '16px Arial';
            this.ctx.fillText(agent.currentEmote, agent.x + 20, agent.y - 20);
        }

        if (agent.health < agent.maxHealth && agent.alive) {
            const barWidth = 50, barHeight = 5;
            const barX = agent.x - barWidth / 2, barY = agent.y - 35;
            this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            this.ctx.fillRect(barX, barY, barWidth, barHeight);
            const healthPercent = agent.health / agent.maxHealth;
            this.ctx.fillStyle = healthPercent > 0.5 ? '#00ff88' : healthPercent > 0.25 ? '#ff9800' : '#ff4444';
            this.ctx.fillRect(barX, barY, barWidth * healthPercent, barHeight);
        }

        if (agent.hasShield && agent.alive) {
            this.ctx.strokeStyle = '#ff9800'; this.ctx.lineWidth = 3;
            this.ctx.beginPath(); this.ctx.arc(agent.x, agent.y, 32, 0, Math.PI * 2); this.ctx.stroke();
        }

        if (agent.frozen && agent.alive) {
            this.ctx.fillStyle = 'rgba(156, 39, 176, 0.4)';
            this.ctx.beginPath(); this.ctx.arc(agent.x, agent.y, 28, 0, Math.PI * 2); this.ctx.fill();
        }

        if (agent.state === 'chasing' && agent.target && agent.target instanceof AIAgent && agent.target.alive) {
            this.ctx.strokeStyle = agent.team.color; this.ctx.lineWidth = 2;
            this.ctx.setLineDash([5, 5]); this.ctx.globalAlpha = 0.5;
            this.ctx.beginPath(); this.ctx.moveTo(agent.x, agent.y);
            this.ctx.lineTo(agent.target.x, agent.target.y); this.ctx.stroke();
            this.ctx.globalAlpha = 1.0; this.ctx.setLineDash([]);
        }

        // 恢复死去的 AI 的 canvas 状态
        if (isActuallyDead) {
            this.ctx.restore();
        }

        this.ctx.shadowBlur = 0;
    }

    drawPowerIndicator() {
        this.ctx.fillStyle = 'rgba(0, 217, 255, 0.1)';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        this.ctx.fillStyle = 'rgba(0, 217, 255, 0.6)';
        this.ctx.font = 'bold 14px Arial'; this.ctx.textAlign = 'center';
        this.ctx.fillText('点击 AI 施加神之力量', this.canvas.width / 2, 30);
    }
}

const game = new Game();

</script>
